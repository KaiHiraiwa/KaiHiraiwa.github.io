document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"font-family:'Cormorant Garamond','Noto Serif JP',serif;font-weight:600;font-size:clamp(28px,3.4vw,42px);margin:0;line-height:1;\">{{ t.contactHeading }}<\u002Fh2>\n        <\u002Fdiv>\n        <p style=\"font-size:clamp(17px,1.7vw,21px);line-height:1.6;color:var(--muted);margin:0 0 26px;max-width:52ch;\">{{ t.contactLead }}<\u002Fp>\n        <div style=\"display:flex;flex-wrap:wrap;gap:14px;\">\n          <sc-for list=\"{{ socials }}\" as=\"s\" hint-placeholder-count=\"2\">\n            <a href=\"{{ s.url }}\" target=\"_blank\" rel=\"noopener\" style=\"display:flex;align-items:baseline;gap:10px;text-decoration:none;color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:13px 20px;\" style-hover=\"border-color:var(--accent);color:var(--accent);\">\n              <span style=\"font-weight:600;font-size:15px;letter-spacing:.04em;\">{{ s.label }}<\u002Fspan>\n              <span style=\"font-size:14px;color:var(--muted);\">{{ s.handle }}<\u002Fspan>\n            <\u002Fa>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n    <\u002Fmain>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    let lang = 'ja';\n    try { lang = localStorage.getItem('kh-lang') || 'ja'; } catch (e) {}\n    this.state = { lang, SITE: this.content() };\n  }\n  componentDidMount() {\n    if (!document.getElementById('kh-webfonts')) {\n      const l = document.createElement('link');\n      l.id = 'kh-webfonts';\n      l.rel = 'stylesheet';\n      l.href = 'https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+JP:wght@400;500;600;700&display=swap';\n      document.head.appendChild(l);\n    }\n  }\n  content() {\n    return {\n      ja: {\n        name: \"平岩 樺生\", nameRoman: \"Kai Hiraiwa\", roleA: \"研究者\", roleB: \"フルート奏者\",\n        field: \"音楽情報処理 × 音響信号処理\",\n        nav: { about: \"プロフィール\", career: \"経歴\", research: \"研究\", music: \"演奏\", contact: \"連絡先\" },\n        heroLead: \"音楽と、人と、その間にあるもの。\",\n        aboutHeading: \"プロフィール\", aboutKicker: \"About\",\n        aboutBody: [\n          \"北海道札幌市出身。11歳からフルートをはじめる。札幌南高等学校を経て一橋大学経済学部卒業。外資系投資銀行勤務を経て、国立音楽大学大学院音楽研究科 修士課程および博士後期課程を修了。博士（音楽）。\",\n          \"現在は産業技術総合研究所 人工知能研究センター 知的メディア処理研究チームの特別研究員として研究に従事。国立音楽大学ミュージック・アトリエ講師。\"\n        ],\n        careerHeading: \"経歴\", careerKicker: \"Career\",\n        timeline: [\n          { year: \"2025 –\", place: \"産業技術総合研究所 人工知能研究センター\", role: \"特別研究員（知的メディア処理研究チーム）\", url: \"https://www.airc.aist.go.jp/en/imprt/\", urlText: \"研究チームのページ →\" },\n          { year: \"2022 – 2025\", place: \"国立音楽大学大学院 音楽研究科 博士後期課程\", role: \"音楽研究専攻 器楽研究領域（フルート）\" },\n          { year: \"2020 – 2022\", place: \"国立音楽大学大学院 音楽研究科 修士課程\", role: \"器楽専攻（フルート）\" },\n          { year: \"2015 – 2019\", place: \"UBS証券株式会社\", role: \"投資銀行本部 株式資本市場部に所属／2015〜 アナリスト、2018〜 アソシエイトディレクター\" },\n          { year: \"2011 – 2015\", place: \"一橋大学 経済学部\", role: \"経済学科\" }\n        ],\n        researchHeading: \"研究\", researchKicker: \"Research\",\n        researchIntro: \"専門：音響信号処理、音楽情報処理\",\n        pubLabel: \"論文・発表\",\n        pubGroups: [\n          { label: \"査読付学術雑誌論文\", items: [\n            { n: \"1\", title: \"Unconscious Overtone Manipulation and Transmission in Flute Performance: Insights into Musical Expression and Perception\", authors: \"Kai Hiraiwa, Masanobu Miura\", venue: \"Frontiers in Psychology, Sec. Performance Science, Vol. 16, Article 1393689, 2025（全11頁）／ DOI: 10.3389/fpsyg.2025.1393689\", url: \"https://doi.org/10.3389/fpsyg.2025.1393689\", linkText: \"論文を読む（Frontiers）→\" }\n          ]},\n          { label: \"査読付国際会議論文\", items: [\n            { n: \"1\", title: \"Probabilistic modeling of tempo fluctuation for comparative analysis of music performances（ポスター発表）\", authors: \"Kai Hiraiwa, Satoru Fukayama\", venue: \"189th Meeting of the Acoustical Society of America（日本音響学会との合同開催）, Honolulu, USA, 2025. JASA, Vol. 158, No. 4 Suppl., A235.\" },\n            { n: \"2\", title: \"Consistency and transition of overtone structure in musical expression on playing the flute\", authors: \"Kai Hiraiwa, Masanobu Miura\", venue: \"ICMPC17–APSCOM7, Tokyo, p. 265, 2023.\" },\n            { n: \"3\", title: \"Consistency of overtone structure in the performance expression of musical phrases by flute（ポスター発表）\", authors: \"Kai Hiraiwa, Masanobu Miura\", venue: \"International Symposium on Performance Science (ISPS) 2023, ID 1012.\" }\n          ]},\n          { label: \"国内会議論文\", items: [\n            { n: \"1\", title: \"吹奏楽コンクール録音の賞別比較における MERT 特徴量の適用と性能評価\", authors: \"平岩樺生, 深山覚\", venue: \"電子情報通信学会技術研究報告（第12回 音声・音響・信号処理ワークショップ）, Vol. 125, No. 369, pp. 344–349, 2026.\" },\n            { n: \"2\", title: \"テンポ変動の確率モデルに基づくピアノ演奏分析の検討\", authors: \"平岩樺生, 深山覚\", venue: \"情報処理学会研究報告（第144回 音楽情報科学研究発表会）, Vol. 2025-MUS-144, No. 21, pp. 1–6, 2025.\" },\n            { n: \"3\", title: \"フルート奏者による音色操作の可視化\", authors: \"平岩樺生, 三浦雅展\", venue: \"日本音響学会2024年度春季研究発表会, 2-5-14, pp. 1257–1260, 2025.\" },\n            { n: \"4\", title: \"フルートの演奏音における高周波成分と音色変化の関係\", authors: \"平岩樺生, 三浦雅展\", venue: \"日本音楽知覚認知学会2024年度春季研究発表会, JSMPC2024(1)-15, pp. 59–64, 2024.\" },\n            { n: \"5\", title: \"フルートの演奏音における倍音構造と音色変化の関係\", authors: \"平岩樺生, 三浦雅展\", venue: \"日本音響学会 音楽音響研究会, MA2023-36, Vol. 42, No. 6, pp. 7–12, 2023.\" },\n            { n: \"6\", title: \"フルートの演奏音における特徴の可視化に関する基礎的検討\", authors: \"平岩樺生, 三浦雅展\", venue: \"日本音響学会 音楽音響研究会 MA2022-44 ／ 日本音楽知覚認知学会2022年度秋季研究発表会, pp. 65–70, 2022.\" }\n          ]}\n        ],\n        affiliationsLabel: \"学会・委員\",\n        affiliations: [\n          \"日本音楽知覚認知学会 会員（2022 – ）\",\n          \"ICMPC2023 Steering Committee, Secretariat（2023 – 2024）\",\n          \"日本音響学会 会員（2024 – ）\",\n          \"情報処理学会 会員（2025 – ）\"\n        ],\n        musicHeading: \"演奏\", musicKicker: \"Performance\",\n        musicIntro: [\n          \"フルートを髙橋聖純、菅井春恵、大友太郎、神田寛明の各氏に師事。\"\n        ],\n        video: { label: \"公開演奏動画\", desc: \"《うろん》(2024)　作曲：山田奈直\", url: \"https://youtu.be/xQMMkU6hjGQ?si=X4Nuuk6uV-rNSnFP\", urlText: \"YouTubeで観る →\" },\n        teachersLabel: \"師事\", teachers: [\"髙橋 聖純\", \"菅井 春恵\", \"大友 太郎\", \"神田 寛明\"],\n        awardsLabel: \"受賞・奨学金\",\n        awards: [\n          \"第26回「万里の長城杯」国際音楽コンクール 管楽器部門 一般の部A 第3位\",\n          \"国立音楽大学同調会 奨学金（修士課程修了時）\",\n          \"（一財）福島育英会 奨学生（2022年度 – ）\"\n        ],\n        dissertation: { label: \"博士論文\", title: \"フルートの演奏音における高周波成分と奏者による音色操作の関係\", inst: \"博士（音楽）, 国立音楽大学, 2025（甲第21号）\", url: \"https://kunion.repo.nii.ac.jp/records/2000673\", urlText: \"国立音楽大学リポジトリで読む→\" },\n        contactHeading: \"連絡先\", contactKicker: \"Contact\",\n        contactLead: \"演奏・レッスンのご依頼、その他お問い合わせはこちらから。\",\n        socials: [\n          { label: \"X\", handle: \"@kai_flute\", url: \"https://x.com/kai_flute\" },\n          { label: \"Instagram\", handle: \"@kai_flute\", url: \"https://www.instagram.com/kai_flute\" }\n        ],\n        contactNote: \"メールアドレス・各種リンクはこちらに設定します。\",\n        portraitNote: \"ポートレート写真\", footer: \"© 2026 Kai Hiraiwa\"\n      },\n      en: {\n        name: \"Kai Hiraiwa\", nameRoman: \"平岩 樺生\", roleA: \"Researcher\", roleB: \"Flutist\",\n        field: \"Music Information Processing × Acoustic Signal Processing\",\n        nav: { about: \"About\", career: \"Career\", research: \"Research\", music: \"Performance\", contact: \"Contact\" },\n        heroLead: \"Music, people, and what lies between.\",\n        aboutHeading: \"About\", aboutKicker: \"Profile\",\n        aboutBody: [\n          \"Born in Sapporo, Hokkaido, I began the flute at the age of eleven. After Sapporo Minami High School, I graduated from Hitotsubashi University with a bachelor's degree in economics. Following four years in investment banking, I completed the master's and doctoral programs at the Graduate School of Music, Kunitachi College of Music, earning the degree of Doctor of Musical Arts (DMA).\",\n          \"I am currently a postdoctoral researcher with the Intelligent Media Processing Research Team, Artificial Intelligence Research Center, National Institute of Advanced Industrial Science and Technology (AIST), Japan. I also teach at the Music Atelier, Kunitachi College of Music.\"\n        ],\n        careerHeading: \"Career\", careerKicker: \"Career\",\n        timeline: [\n          { year: \"2025 –\", place: \"National Institute of Advanced Industrial Science and Technology (AIST), Japan\", role: \"Postdoctoral Researcher, Intelligent Media Processing Research Team, Artificial Intelligence Research Center\", url: \"https://www.airc.aist.go.jp/en/imprt/\", urlText: \"Research team page →\" },\n          { year: \"2022 – 2025\", place: \"Graduate School of Music, Kunitachi College of Music\", role: \"Doctor of Musical Arts (DMA) — Flute Performance\" },\n          { year: \"2020 – 2022\", place: \"Graduate School of Music, Kunitachi College of Music\", role: \"Master of Music (MM) — Flute Performance\" },\n          { year: \"2015 – 2019\", place: \"UBS Securities Japan Co., Ltd.\", role: \"Investment Banking Division, Equity Capital Markets — Analyst (2015–2018), Associate Director (2018–2019)\" },\n          { year: \"2011 – 2015\", place: \"Hitotsubashi University\", role: \"Bachelor's degree, Faculty of Economics\" }\n        ],\n        researchHeading: \"Research\", researchKicker: \"Research\",\n        researchIntro: \"Research areas: acoustic signal processing and music information processing\",\n        pubLabel: \"Publications & Talks\",\n        pubGroups: [\n          { label: \"Peer-reviewed Journal Articles\", items: [\n            { n: \"1\", title: \"Unconscious Overtone Manipulation and Transmission in Flute Performance: Insights into Musical Expression and Perception\", authors: \"Kai Hiraiwa, Masanobu Miura\", venue: \"Frontiers in Psychology (Performance Science), Vol. 16, Article 1393689, 2025 · DOI: 10.3389/fpsyg.2025.1393689\", url: \"https://doi.org/10.3389/fpsyg.2025.1393689\", linkText: \"Read on Frontiers →\" }\n          ]},\n          { label: \"Peer-reviewed International Conference Papers\", items: [\n            { n: \"1\", title: \"Probabilistic modeling of tempo fluctuation for comparative analysis of music performances (Poster)\", authors: \"Kai Hiraiwa, Satoru Fukayama\", venue: \"189th Meeting of the Acoustical Society of America (joint meeting with the Acoustical Society of Japan), Honolulu, 2025. J. Acoust. Soc. Am., Vol. 158, No. 4 Suppl., A235.\" },\n            { n: \"2\", title: \"Consistency and transition of overtone structure in musical expression on playing the flute\", authors: \"Kai Hiraiwa, Masanobu Miura\", venue: \"17th International Conference on Music Perception and Cognition (ICMPC17–APSCOM7), Tokyo, p. 265, 2023.\" },\n            { n: \"3\", title: \"Consistency of overtone structure in the performance expression of musical phrases by flute (Poster)\", authors: \"Kai Hiraiwa, Masanobu Miura\", venue: \"International Symposium on Performance Science (ISPS) 2023, ID 1012.\" }\n          ]},\n          { label: \"Domestic Conference Papers (Japan)\", items: [\n            { n: \"1\", title: \"Application and performance evaluation of MERT features in award-based comparison of All Japan Band Competition recordings\", authors: \"Kai Hiraiwa, Satoru Fukayama\", venue: \"IEICE Technical Report (12th Workshop on Speech, Audio, and Signal Processing), Vol. 125, No. 369, pp. 344–349, 2026. (in Japanese)\" },\n            { n: \"2\", title: \"Probabilistic modeling of tempo fluctuation for comparative analysis of classical piano performances\", authors: \"Kai Hiraiwa, Satoru Fukayama\", venue: \"IPSJ SIG Technical Report (144th Meeting of SIG Music and Computer), Vol. 2025-MUS-144, No. 21, pp. 1–6, 2025. (in Japanese)\" },\n            { n: \"3\", title: \"Visualisation of timbre manipulation by flautists\", authors: \"Kai Hiraiwa, Masanobu Miura\", venue: \"Spring Meeting of the Acoustical Society of Japan, 2-5-14, pp. 1257–1260, 2025. (in Japanese)\" },\n            { n: \"4\", title: \"Relationship between high-frequency components and timbre changes in the sound of flute playing\", authors: \"Kai Hiraiwa, Masanobu Miura\", venue: \"Spring Meeting of the Japanese Society for Music Perception and Cognition, JSMPC2024(1)-15, pp. 59–64, 2024. (in Japanese)\" },\n            { n: \"5\", title: \"The relationship between overtone structure and timbre variation in the sound of the flute\", authors: \"Kai Hiraiwa, Masanobu Miura\", venue: \"Technical Committee on Musical Acoustics, Acoustical Society of Japan, MA2023-36, Vol. 42, No. 6, pp. 7–12, 2023. (in Japanese)\" },\n            { n: \"6\", title: \"Fundamental study on the visualisation of features in the sound of flute playing\", authors: \"Kai Hiraiwa, Masanobu Miura\", venue: \"Technical Committee on Musical Acoustics (MA2022-44) / Autumn Meeting of the JSMPC, pp. 65–70, 2022. (in Japanese)\" }\n          ]}\n        ],\n        affiliationsLabel: \"Affiliations & Service\",\n        affiliations: [\n          \"Member, Japanese Society for Music Perception and Cognition (2022–present)\",\n          \"Secretariat, Steering Committee, ICMPC2023 (2023–2024)\",\n          \"Member, Acoustical Society of Japan (2024–present)\",\n          \"Member, Information Processing Society of Japan (2025–present)\"\n        ],\n        musicHeading: \"Performance\", musicKicker: \"Performance\",\n        musicIntro: [\n          \"I studied the flute with Seijun Takahashi, Harue Sugai, Taro Otomo, and Hiroaki Kanda.\"\n        ],\n        video: { label: \"Performance Video\", desc: \"Uron — Doubtful (2024) for ensemble, by Nanao Yamada\", url: \"https://youtu.be/xQMMkU6hjGQ?si=X4Nuuk6uV-rNSnFP\", urlText: \"Watch on YouTube →\" },\n        teachersLabel: \"Studied with\", teachers: [\"Seijun Takahashi\", \"Harue Sugai\", \"Taro Otomo\", \"Hiroaki Kanda\"],\n        awardsLabel: \"Awards & Scholarships\",\n        awards: [\n          \"Third Prize, Wind Instruments (General Division A), 26th Great Wall Cup International Music Competition\",\n          \"Kunitachi College of Music Dōchōkai Scholarship, awarded on completion of the master's program\",\n          \"Scholarship Student, Fukushima Ikuei Foundation (2022–present)\"\n        ],\n        dissertation: { label: \"Doctoral Dissertation\", title: \"Relationship between high-frequency components and tonal manipulation by players in the sound of flute playing\", inst: \"DMA dissertation, Kunitachi College of Music, 2025\", url: \"https://kunion.repo.nii.ac.jp/records/2000673\", urlText: \"View in the Kunitachi College of Music Repository →\" },\n        contactHeading: \"Contact\", contactKicker: \"Contact\",\n        contactLead: \"For performance and lesson enquiries, and any other questions, please get in touch.\",\n        socials: [\n          { label: \"X\", handle: \"@kai_flute\", url: \"https://x.com/kai_flute\" },\n          { label: \"Instagram\", handle: \"@kai_flute\", url: \"https://www.instagram.com/kai_flute\" }\n        ],\n        contactNote: \"Email address and links will be set here.\",\n        portraitNote: \"portrait photo\", footer: \"© 2026 Kai Hiraiwa\"\n      }\n    };\n  }\n  setLang(l) {\n    try { localStorage.setItem('kh-lang', l); } catch (e) {}\n    this.setState({ lang: l });\n  }\n  renderVals() {\n    const S = this.state.SITE;\n    const lang = this.state.lang;\n    if (!S) return { ready: false };\n    const t = S[lang];\n    const on = 'padding:7px 13px;border:0;cursor:pointer;font-family:inherit;background:var(--accent);color:var(--paper);letter-spacing:.1em;';\n    const off = 'padding:7px 13px;border:0;cursor:pointer;font-family:inherit;background:transparent;color:var(--muted);letter-spacing:.1em;';\n    return {\n      ready: true,\n      t,\n      lang,\n      jaBtn: lang === 'ja' ? on : off,\n      enBtn: lang === 'en' ? on : off,\n      setJa: () => this.setLang('ja'),\n      setEn: () => this.setLang('en'),\n      aboutBody: t.aboutBody,\n      timeline: t.timeline,\n      affiliations: t.affiliations,\n      pubGroups: t.pubGroups,\n      diss: t.dissertation,\n      musicIntro: t.musicIntro,\n      teachers: t.teachers,\n      awards: t.awards,\n      video: t.video,\n      socials: t.socials,\n      nav: [\n        { num: '01', label: t.nav.about, href: '#about' },\n        { num: '02', label: t.nav.career, href: '#career' },\n        { num: '03', label: t.nav.research, href: '#research' },\n        { num: '04', label: t.nav.music, href: '#music' },\n        { num: '05', label: t.nav.contact, href: '#contact' }\n      ]\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
